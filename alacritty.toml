[window]
# Reducimos el margen interno al mínimo (1 píxel) para ganar espacio
padding = { x = 1, y = 1 }
opacity = 0.85
dynamic_title = true
# Mantenemos la barra, pero al reducir el tamaño de letra, la ventana total es más pequeña
decorations = "Full"

[font]
# Bajamos a 8.2. Es el límite antes de que se vuelva difícil de leer
size = 8.2
normal = { family = "monospace", style = "Regular" }

[colors.primary]
background = '#0d0f14'
foreground = '#FFFFFF'

[colors.normal]
black =   '#1b1e28'
red =     '#ff2c70' 
green =   '#a2ff00' 
yellow =  '#ffcc00' 
blue =    '#00d5ff' 
magenta = '#cc66ff' 
cyan =    '#48ffda' 
white =   '#d1d1d1' 

[colors.bright]
black =   '#565b6e'
red =     '#ff5189' 
green =   '#c1ff4d'
yellow =  '#ffe066'
blue =    '#59e3ff'
magenta = '#d98cff'
cyan =    '#91ffe7'
white =   '#FFFFFF' 

[colors.cursor]
cursor = '#FFFFFF'
text = '#000000'

[cursor]
style = { shape = "Block", blinking = "Off" }
